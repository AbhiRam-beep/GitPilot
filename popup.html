<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: #1f2328;
      background: #ffffff;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #d0d7de;
    }
    .header svg { color: #0969da; flex-shrink: 0; }
    .header span { font-weight: 600; font-size: 13px; }
    .badge {
      font-size: 10px;
      font-weight: 600;
      background: #ddf4ff;
      color: #0550ae;
      padding: 2px 6px;
      border-radius: 20px;
      margin-left: auto;
    }
    .body { padding: 14px 16px; }
    .body p {
      color: #636c76;
      line-height: 1.5;
      font-size: 12.5px;
    }
    .hint {
      margin-top: 12px;
      padding: 10px 12px;
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 12px;
      color: #636c76;
      line-height: 1.5;
    }
    .hint code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      background: #dfe1e4;
      padding: 1px 4px;
      border-radius: 3px;
      color: #1f2328;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 8v4l3 3"/>
    </svg>
    <span>GitHub Agent</span>
    <span class="badge">BETA</span>
  </div>
  <div class="body">
    <p>Navigate to any GitHub repo, then click the floating button at the bottom-right to open the agent panel.</p>
    <div class="hint">
      Press <code>Ctrl+Enter</code> or <code>⌘+Enter</code> to submit a prompt.
    </div>
  </div>
</body>
</html>
